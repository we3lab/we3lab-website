name: Update Site

on:
  schedule:
    - cron: '0 2 * * 1'  # 6pm PT / 9pm ET every Sunday
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run build_people_page
        run: python scripts/build_people_page.py

      - name: Run update_subgroup_members
        run: python scripts/update_subgroup_members.py

      - name: Run build_research_pages
        run: python scripts/build_research_pages.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: auto-update site pages [skip ci]"
            git push
          fi
