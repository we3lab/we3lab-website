name: Update Site

on:
  schedule:
    - cron: '0 2 * * 1'  # 6pm PT / 9pm ET every Sunday
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch publications from Semantic Scholar
        run: python scripts/fetch_publications.py

      - name: Tag publications with research areas and team members
        run: python scripts/tag_publications.py

      - name: Build partnerships page
        run: python scripts/build_partnerships_page.py

      - name: Build home page
        run: python scripts/build_home_page.py

      - name: Build What We Do page
        run: python scripts/build_research_page.py

      - name: Build research area sub-pages
        run: python scripts/build_research_subpages.py

      - name: Build Who We Are page and profile pages
        run: python scripts/build_people_page.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: auto-update site pages [skip ci]"
            git push
          fi
